version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # collapse routine minor/patch bumps into ONE PR; majors stay
      # individual so a risky bump gets its own scrutiny.
      maven-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Spring Boot 4 is a deliberate major migration, not a routine bump — don't nag.
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
